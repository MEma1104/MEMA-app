<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>MEMA - Mănânci Economic, Mănânci Aproape</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0a0c12;
    color: #fff;
    overflow: hidden;
    height: 100vh;
    position: fixed;
    width: 100%;
  }

  /* INTRO SCREEN */
  #introScreen {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(135deg, #1a1c24 0%, #0a0c12 100%);
    z-index: 10000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding-top: 60px;
    transition: opacity 0.5s ease, visibility 0.5s ease;
  }

  #introScreen.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  .food-image-container {
    position: relative;
    width: 220px;
    height: 220px;
    margin-bottom: 20px;
    animation: explodeIn 1.2s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
  }

  .food-image {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    box-shadow: 0 20px 60px rgba(255, 107, 107, 0.5);
    border: 4px solid rgba(255, 255, 255, 0.2);
  }

  .food-particles {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 100%;
    height: 100%;
    transform: translate(-50%, -50%);
  }

  .particle {
    position: absolute;
    width: 12px;
    height: 12px;
    background: linear-gradient(135deg, #ff6b6b, #ff9f4a);
    border-radius: 50%;
    opacity: 0;
    animation: particleBurst 1.5s ease-out forwards;
  }

  .particle:nth-child(1) { top: 0; left: 50%; animation-delay: 0.3s; }
  .particle:nth-child(2) { top: 50%; right: 0; animation-delay: 0.4s; }
  .particle:nth-child(3) { bottom: 0; left: 50%; animation-delay: 0.5s; }
  .particle:nth-child(4) { top: 50%; left: 0; animation-delay: 0.6s; }
  .particle:nth-child(5) { top: 15%; right: 15%; animation-delay: 0.7s; }
  .particle:nth-child(6) { bottom: 15%; left: 15%; animation-delay: 0.8s; }
  .particle:nth-child(7) { top: 15%; left: 15%; animation-delay: 0.9s; }
  .particle:nth-child(8) { bottom: 15%; right: 15%; animation-delay: 1s; }

  @keyframes explodeIn {
    0% {
      transform: scale(0) rotate(-180deg);
      opacity: 0;
    }
    50% {
      transform: scale(1.3) rotate(10deg);
    }
    100% {
      transform: scale(1) rotate(0deg);
      opacity: 1;
    }
  }

  @keyframes particleBurst {
    0% {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
    }
    100% {
      transform: translate(var(--tx, 100px), var(--ty, -100px)) scale(0);
      opacity: 0;
    }
  }

  .intro-logo-container {
    text-align: center;
    opacity: 0;
    animation: fadeInUp 0.8s ease forwards;
    animation-delay: 1s;
    margin-bottom: 30px;
  }

  .intro-logo {
    font-family: 'Montserrat', sans-serif;
    font-size: 4rem;
    font-weight: 900;
    letter-spacing: 6px;
    background: linear-gradient(135deg, #ff6b6b 0%, #ff9f4a 50%, #ff6b6b 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 60px rgba(255,107,107,0.5);
    margin-bottom: 10px;
  }

  .intro-tagline {
    font-size: 1rem;
    color: #aaa;
    letter-spacing: 2px;
  }

  .intro-tagline .brand-m { color: #ff6b6b; font-weight: 600; }
  .intro-tagline .brand-e { color: #ff8a5c; font-weight: 600; }
  .intro-tagline .brand-m2 { color: #ff9f4a; font-weight: 600; }
  .intro-tagline .brand-a { color: #ff6b6b; font-weight: 600; }

  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(30px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .intro-buttons {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    width: 80%;
    max-width: 320px;
    opacity: 0;
    animation: fadeInUp 0.8s ease forwards;
    animation-delay: 1.4s;
    margin-top: 20px;
  }

  .intro-btn-client {
    width: 100%;
    padding: 20px 40px;
    background: linear-gradient(135deg, #ff6b6b 0%, #ff9f4a 100%);
    color: white;
    border: none;
    border-radius: 30px;
    font-family: 'Montserrat', sans-serif;
    font-weight: 900;
    font-size: 1.3rem;
    cursor: pointer;
    transition: all 0.3s ease;
    text-transform: uppercase;
    letter-spacing: 3px;
    box-shadow: 0 15px 40px rgba(255,107,107,0.5);
  }

  .intro-btn-client:active {
    transform: scale(0.95);
    box-shadow: 0 10px 30px rgba(255,107,107,0.4);
  }

  .intro-btn-comerciant {
    width: 50%;
    padding: 12px 20px;
    background: transparent;
    color: #888;
    border: 2px solid #444;
    border-radius: 20px;
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.3s ease;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 10px;
  }

  .intro-btn-comerciant:active {
    background: rgba(255,255,255,0.05);
    transform: scale(0.95);
  }

  /* MERCHANT PAGE */
  #merchantPage {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(135deg, #1a1c24 0%, #0a0c12 100%);
    z-index: 9999;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  #merchantPage.visible {
    display: flex;
  }

  .merchant-content {
    text-align: center;
  }

  .merchant-logo {
    font-family: 'Montserrat', sans-serif;
    font-size: 2.5rem;
    font-weight: 900;
    background: linear-gradient(135deg, #ff6b6b 0%, #ff9f4a 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 20px;
  }

  .merchant-text {
    color: #aaa;
    font-size: 1.1rem;
    margin-bottom: 30px;
    line-height: 1.6;
  }

  .back-btn {
    padding: 15px 40px;
    background: rgba(255, 255, 255, 0.1);
    border: 2px solid rgba(255, 255, 255, 0.2);
    color: white;
    border-radius: 25px;
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s;
  }

  .back-btn:active {
    background: rgba(255, 255, 255, 0.2);
    transform: scale(0.95);
  }

  /* MAIN APP */
  #map {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 1;
  }

  .back-to-intro-btn {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 2000;
    background: rgba(0, 0, 0, 0.8);
    backdrop-filter: blur(10px);
    border: 2px solid rgba(255, 107, 107, 0.3);
    color: white;
    padding: 10px 15px;
    border-radius: 20px;
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    cursor: pointer;
    display: none;
    align-items: center;
    gap: 5px;
    transition: all 0.3s;
  }

  .back-to-intro-btn.visible {
    display: flex;
  }

  .back-to-intro-btn:active {
    background: rgba(255, 107, 107, 0.3);
    transform: scale(0.95);
  }

  .panel-container {
    position: absolute;
    top: 60px;
    left: 10px;
    right: 10px;
    z-index: 1000;
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    touch-action: pan-y;
  }

  .panel-container.minimized {
    transform: translateY(calc(-100% + 130px));
  }

  .center-card {
    background: rgba(0, 0, 0, 0.92);
    backdrop-filter: blur(25px);
    border-radius: 25px;
    padding: 20px;
    border: 2px solid rgba(255, 107, 107, 0.2);
    box-shadow: 0 20px 60px rgba(0,0,0,0.8);
    display: flex;
    flex-direction: column;
  }

  .header {
    text-align: center;
    margin-bottom: 20px;
    pointer-events: none;
    flex-shrink: 0;
  }

  .logo {
    font-family: 'Montserrat', sans-serif;
    font-size: 2.5rem;
    font-weight: 900;
    letter-spacing: 4px;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #ff6b6b 0%, #ff9f4a 50%, #ff6b6b 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 40px rgba(255,107,107,0.3);
    animation: shine 3s ease-in-out infinite;
  }

  @keyframes shine {
    0%, 100% { filter: brightness(1); }
    50% { filter: brightness(1.2); }
  }

  .tagline {
    font-size: 0.85rem;
    font-weight: 400;
    letter-spacing: 1.5px;
    color: #aaa;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .tagline .brand-m { color: #ff6b6b; font-weight: 600; }
  .tagline .brand-e { color: #ff8a5c; font-weight: 600; }
  .tagline .brand-m2 { color: #ff9f4a; font-weight: 600; }
  .tagline .brand-a { color: #ff6b6b; font-weight: 600; }

  .content-area {
    transition: max-height 0.3s ease, opacity 0.3s ease;
    overflow: hidden;
    flex: 1;
  }

  .panel-container.minimized .content-area {
    max-height: 0;
    opacity: 0;
    pointer-events: none;
  }

  .swipe-area {
    width: 100%;
    padding: 12px 0 8px 0;
    cursor: grab;
    touch-action: pan-y;
    user-select: none;
    -webkit-user-select: none;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    margin-top: 10px;
    border-top: 1px solid rgba(255,255,255,0.1);
  }

  .swipe-area:active {
    cursor: grabbing;
  }

  .drag-line {
    width: 40px;
    height: 4px;
    background: rgba(255,255,255,0.3);
    border-radius: 3px;
  }

  .swipe-arrow {
    font-size: 1.3rem;
    color: #ff9f4a;
    animation: bounceArrow 1.5s ease-in-out infinite;
    transition: transform 0.3s ease;
  }

  .panel-container.minimized .swipe-arrow {
    animation: bounceArrowUp 1.5s ease-in-out infinite;
  }

  @keyframes bounceArrow {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }

  @keyframes bounceArrowUp {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(4px); }
  }

  .swipe-hint {
    font-size: 0.7rem;
    color: #666;
  }

  .gps-button {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, #ff6b6b 0%, #ff9f4a 100%);
    color: white;
    border: none;
    border-radius: 20px;
    font-weight: 800;
    font-size: 1rem;
    cursor: pointer;
    margin-bottom: 15px;
    box-shadow: 0 10px 30px rgba(255,107,107,0.4);
    transition: all 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .gps-button:active {
    transform: scale(0.98);
  }

  .gps-icon {
    width: 20px;
    height: 20px;
    border: 2px solid white;
    border-radius: 50%;
    position: relative;
    animation: pulse 2s infinite;
  }

  .gps-icon::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 6px;
    height: 6px;
    background: white;
    border-radius: 50%;
    transform: translate(-50%, -50%);
  }

  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(255,255,255,0.7); }
    70% { box-shadow: 0 0 0 10px rgba(255,255,255,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); }
  }

  .filters {
    display: flex;
    flex-direction: column;
    gap: 15px;
    margin-bottom: 15px;
  }

  .filter-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .filter-label {
    font-size: 0.85rem;
    color: #aaa;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .filter-value {
    color: #ff9f4a;
    font-weight: 700;
    font-size: 0.95rem;
  }

  input[type="range"] {
    width: 100%;
    height: 6px;
    -webkit-appearance: none;
    background: #333;
    border-radius: 3px;
    outline: none;
    margin-top: 8px;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px;
    height: 22px;
    background: linear-gradient(135deg, #ff6b6b, #ff9f4a);
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 2px 10px rgba(255,107,107,0.5);
    border: 2px solid white;
  }

  .search-btn {
    width: 100%;
    padding: 18px;
    background: white;
    color: #0a0c12;
    border: none;
    border-radius: 20px;
    font-weight: 900;
    font-size: 1rem;
    cursor: pointer;
    margin-bottom: 10px;
    transition: all 0.3s;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .search-btn:active {
    transform: scale(0.98);
  }

  .status {
    text-align: center;
    font-size: 0.8rem;
    color: #888;
    min-height: 20px;
  }

  .info-card {
    position: absolute;
    bottom: 20px;
    left: 20px;
    right: 20px;
    z-index: 100;
    background: rgba(0, 0, 0, 0.95);
    backdrop-filter: blur(25px);
    border-radius: 25px;
    padding: 20px;
    border: 2px solid rgba(255,107,107,0.2);
    display: none;
    pointer-events: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.8);
  }

  .info-card.visible {
    display: block;
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .place-name {
    font-size: 1.2rem;
    font-weight: 700;
    margin-bottom: 5px;
  }

  .place-price {
    color: #ff9f4a;
    font-weight: 700;
    font-size: 1rem;
    margin-bottom: 8px;
  }

  .place-address {
    color: #aaa;
    font-size: 0.85rem;
    margin-bottom: 15px;
  }

  .nav-btn {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: white;
    border: none;
    border-radius: 20px;
    font-weight: 800;
    font-size: 1rem;
    cursor: pointer;
  }

  .close-btn {
    position: absolute;
    top: 15px;
    right: 15px;
    width: 32px;
    height: 32px;
    background: rgba(255,255,255,0.1);
    border: none;
    border-radius: 50%;
    color: white;
    font-size: 1.2rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .custom-marker {
    min-width: 50px;
    height: 36px;
    background: linear-gradient(135deg, #ff6b6b, #ff9f4a);
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-size: 0.85rem;
    color: white;
    border: 3px solid white;
    box-shadow: 0 3px 10px rgba(0,0,0,0.4);
    padding: 0 10px;
    white-space: nowrap;
  }

  .user-marker {
    width: 24px;
    height: 24px;
    background: #3b82f6;
    border-radius: 50%;
    border: 3px solid white;
    box-shadow: 0 0 0 4px rgba(59,130,246,0.3);
    animation: pulseBlue 2s infinite;
  }

  @keyframes pulseBlue {
    0% { box-shadow: 0 0 0 0 rgba(59,130,246,0.6); }
    70% { box-shadow: 0 0 0 12px rgba(59,130,246,0); }
    100% { box-shadow: 0 0 0 0 rgba(59,130,246,0); }
  }

  .loader {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid #fff;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>

<!-- INTRO SCREEN -->
<div id="introScreen">
  <div class="food-image-container">
    <img src="https://images.unsplash.com/photo-1555939594-58d7cb561ad1?w=400&h=400&fit=crop" alt="Diverse Food" class="food-image">
    <div class="food-particles">
      <div class="particle" style="--tx: 90px; --ty: -90px;"></div>
      <div class="particle" style="--tx: -90px; --ty: -90px;"></div>
      <div class="particle" style="--tx: 90px; --ty: 90px;"></div>
      <div class="particle" style="--tx: -90px; --ty: 90px;"></div>
      <div class="particle" style="--tx: 110px; --ty: 0px;"></div>
      <div class="particle" style="--tx: -110px; --ty: 0px;"></div>
      <div class="particle" style="--tx: 0px; --ty: -110px;"></div>
      <div class="particle" style="--tx: 0px; --ty: 110px;"></div>
    </div>
  </div>
  
  <div class="intro-logo-container">
    <div class="intro-logo">MEMA</div>
    <div class="intro-tagline">
      <span class="brand-m">M</span>ănânci <span class="brand-e">E</span>conomic, <span class="brand-m2">M</span>ănânci <span class="brand-a">A</span>proape
    </div>
  </div>
  
  <div class="intro-buttons">
    <button class="intro-btn-client" onclick="openClient()">
      🍽️ CLIENT
    </button>
    <button class="intro-btn-comerciant" onclick="openMerchant()">
      🏪 Comerciant
    </button>
  </div>
</div>

<!-- MERCHANT PAGE -->
<div id="merchantPage">
  <div class="merchant-content">
    <div class="merchant-logo">MEMA</div>
    <div class="merchant-text">
      Zona Comercianți<br>
      <span style="font-size: 0.9rem; color: #666;">(În curând mai multe funcții)</span>
    </div>
    <button class="back-btn" onclick="backToIntro()">← Înapoi la meniu</button>
  </div>
</div>

<!-- BACK BUTTON FOR CLIENT -->
<button class="back-to-intro-btn" id="backToIntroBtn" onclick="backToIntroFromClient()">
  ← Meniu
</button>

<!-- MAIN APP -->
<div id="map"></div>

<div class="panel-container" id="panelContainer">
  <div class="center-card">
    <div class="header">
      <div class="logo">MEMA</div>
      <div class="tagline">
        <span class="brand-m">M</span>ănânci <span class="brand-e">E</span>conomic, <span class="brand-m2">M</span>ănânci <span class="brand-a">A</span>proape
      </div>
    </div>

    <div class="content-area" id="contentArea">
      <button class="gps-button" onclick="getLocation()">
        <div class="gps-icon"></div>
        LOCALIZEAZĂ-MĂ
      </button>

      <div class="filters">
        <div>
          <div class="filter-row">
            <span class="filter-label">📍 Raza de căutare</span>
            <span class="filter-value" id="radiusValue">1000 m</span>
          </div>
          <input type="range" id="radiusSlider" min="10" max="5000" step="10" value="1000">
        </div>

        <div>
          <div class="filter-row">
            <span class="filter-label">💰 Buget maxim</span>
            <span class="filter-value" id="budgetValue">50 lei</span>
          </div>
          <input type="range" id="budgetSlider" min="10" max="1000" step="10" value="50">
        </div>
      </div>

      <button class="search-btn" onclick="searchPlaces()">🔍 CAUTĂ LOCURI</button>
      
      <div class="status" id="status">Apasă LOCALIZEAZĂ-MĂ pentru a începe</div>
    </div>
    
    <div class="swipe-area" id="swipeArea">
      <div class="drag-line"></div>
      <div class="swipe-arrow" id="swipeArrow">⇡</div>
      <div class="swipe-hint" id="swipeHint">Swipe în sus pentru a minimiza</div>
    </div>
  </div>
</div>

<div id="infoCard" class="info-card">
  <button class="close-btn" onclick="closeCard()">×</button>
  <div id="placeName" class="place-name"></div>
  <div id="placePrice" class="place-price"></div>
  <div id="placeAddress" class="place-address"></div>
  <button class="nav-btn" onclick="navigate()">🧭 Navigare Google Maps</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
let map;
let userMarker;
let radiusCircle;
let placeMarkers = [];
let currentLat = null;
let currentLng = null;
let selectedPlace = null;
let isMinimized = false;

const els = {
  panelContainer: document.getElementById('panelContainer'),
  contentArea: document.getElementById('contentArea'),
  swipeArea: document.getElementById('swipeArea'),
  swipeArrow: document.getElementById('swipeArrow'),
  swipeHint: document.getElementById('swipeHint'),
  radiusSlider: document.getElementById('radiusSlider'),
  radiusValue: document.getElementById('radiusValue'),
  budgetSlider: document.getElementById('budgetSlider'),
  budgetValue: document.getElementById('budgetValue'),
  status: document.getElementById('status'),
  infoCard: document.getElementById('infoCard'),
  placeName: document.getElementById('placeName'),
  placePrice: document.getElementById('placePrice'),
  placeAddress: document.getElementById('placeAddress'),
  introScreen: document.getElementById('introScreen'),
  merchantPage: document.getElementById('merchantPage'),
  backToIntroBtn: document.getElementById('backToIntroBtn')
};

// Intro functions
function openMerchant() {
  els.introScreen.classList.add('hidden');
  els.merchantPage.classList.add('visible');
}

function openClient() {
  els.introScreen.classList.add('hidden');
  els.backToIntroBtn.classList.add('visible');
  initMap();
}

function backToIntro() {
  els.merchantPage.classList.remove('visible');
  els.introScreen.classList.remove('hidden');
}

function backToIntroFromClient() {
  els.backToIntroBtn.classList.remove('visible');
  els.introScreen.classList.remove('hidden');
  if (map) {
    map.remove();
    map = null;
  }
  userMarker = null;
  radiusCircle = null;
  placeMarkers = [];
  currentLat = null;
  currentLng = null;
}

// Swipe handling
let touchStartY = 0;
let touchEndY = 0;
let isDragging = false;

els.swipeArea.addEventListener('touchstart', handleTouchStart, {passive: true});
els.swipeArea.addEventListener('touchmove', handleTouchMove, {passive: true});
els.swipeArea.addEventListener('touchend', handleTouchEnd, {passive: true});

els.swipeArea.addEventListener('mousedown', handleMouseDown);
document.addEventListener('mousemove', handleMouseMove);
document.addEventListener('mouseup', handleMouseUp);

function handleTouchStart(e) {
  touchStartY = e.changedTouches[0].screenY;
  isDragging = true;
}

function handleMouseDown(e) {
  touchStartY = e.screenY;
  isDragging = true;
  e.preventDefault();
}

function handleTouchMove(e) {
  if (!isDragging) return;
  touchEndY = e.changedTouches[0].screenY;
}

function handleMouseMove(e) {
  if (!isDragging) return;
  touchEndY = e.screenY;
}

function handleTouchEnd(e) {
  if (!isDragging) return;
  isDragging = false;
  handleSwipe();
}

function handleMouseUp(e) {
  if (!isDragging) return;
  isDragging = false;
  handleSwipe();
}

function handleSwipe() {
  const swipeThreshold = 50;
  const diff = touchStartY - touchEndY;
  
  if (Math.abs(diff) > swipeThreshold) {
    if (diff > 0 && !isMinimized) {
      minimizePanel();
    } else if (diff < 0 && isMinimized) {
      expandPanel();
    }
  }
}

function minimizePanel() {
  isMinimized = true;
  els.panelContainer.classList.add('minimized');
  els.swipeArrow.textContent = '⇣';
  els.swipeHint.textContent = 'Swipe în jos pentru a deschide';
}

function expandPanel() {
  isMinimized = false;
  els.panelContainer.classList.remove('minimized');
  els.swipeArrow.textContent = '⇡';
  els.swipeHint.textContent = 'Swipe în sus pentru a minimiza';
}

function initMap() {
  if (map) return;
  
  map = L.map('map', {zoomControl: false}).setView([44.4325, 26.1038], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: ''
  }).addTo(map);
  
  L.control.zoom({position: 'bottomright'}).addTo(map);
  
  els.radiusSlider.addEventListener('input', function() {
    els.radiusValue.textContent = this.value + ' m';
    if (currentLat) updateCircle(parseInt(this.value));
  });
  
  els.budgetSlider.addEventListener('input', function() {
    els.budgetValue.textContent = this.value + ' lei';
  });
  
  map.on('click', () => {
    els.infoCard.classList.remove('visible');
  });
}

function getLocation() {
  if (!navigator.geolocation) {
    els.status.innerHTML = '❌ GPS indisponibil';
    return;
  }
  
  els.status.innerHTML = '<span class="loader"></span> Se obține locația...';
  
  navigator.geolocation.getCurrentPosition(
    function(pos) {
      currentLat = pos.coords.latitude;
      currentLng = pos.coords.longitude;
      
      map.setView([currentLat, currentLng], 16);
      
      if (userMarker) map.removeLayer(userMarker);
      const icon = L.divIcon({
        html: '<div class="user-marker"></div>',
        className: '',
        iconSize: [24, 24],
        iconAnchor: [12, 12]
      });
      userMarker = L.marker([currentLat, currentLng], {icon: icon, zIndexOffset: 1000}).addTo(map);
      
      updateCircle(parseInt(els.radiusSlider.value));
      els.status.innerHTML = '✅ Locație obținută! Apasă CAUTĂ LOCURI';
    },
    function(err) {
      console.error(err);
      els.status.innerHTML = '❌ GPS indisponibil. Verifică permisiunile.';
    },
    {enableHighAccuracy: true, timeout: 10000, maximumAge: 0}
  );
}

function updateCircle(radius) {
  if (radiusCircle) map.removeLayer(radiusCircle);
  
  radiusCircle = L.circle([currentLat, currentLng], {
    radius: radius,
    color: '#ff6b6b',
    weight: 2,
    fillColor: '#ff6b6b',
    fillOpacity: 0.1,
    dashArray: '5,5'
  }).addTo(map);
  
  map.fitBounds(radiusCircle.getBounds(), {padding: [50,50]});
}

async function searchPlaces() {
  if (!currentLat) {
    els.status.innerHTML = '⚠️ Apasă mai întâi LOCALIZEAZĂ-MĂ';
    return;
  }
  
  const radius = parseInt(els.radiusSlider.value);
  const budget = parseInt(els.budgetSlider.value);
  
  els.status.innerHTML = '<span class="loader"></span> Se caută...';
  
  placeMarkers.forEach(m => map.removeLayer(m));
  placeMarkers = [];
  
  try {
    const radiusDeg = radius / 111000;
    const query = `[out:json][timeout:25];
(
  node["amenity"~"restaurant|fast_food|cafe|pub|bar"](${currentLat - radiusDeg},${currentLng - radiusDeg},${currentLat + radiusDeg},${currentLng + radiusDeg});
  way["amenity"~"restaurant|fast_food|cafe|pub|bar"](${currentLat - radiusDeg},${currentLng - radiusDeg},${currentLat + radiusDeg},${currentLng + radiusDeg});
);
out body center;`;
    
    const response = await fetch('https://overpass-api.de/api/interpreter', {
      method: 'POST',
      body: query,
      headers: {'Content-Type': 'application/x-www-form-urlencoded'}
    });
    
    const data = await response.json();
    const places = [];
    const seen = new Set();
    
    for (const el of data.elements) {
      let lat, lng;
      if (el.type === 'node') {
        lat = el.lat; lng = el.lon;
      } else if (el.center) {
        lat = el.center.lat; lng = el.center.lon;
      } else continue;
      
      const dist = getDistance(currentLat, currentLng, lat, lng);
      if (dist > radius) continue;
      
      const amenity = el.tags?.amenity || 'restaurant';
      const price = getPrice(amenity);
      if (price > budget) continue;
      
      const name = el.tags?.name || defaultName(amenity);
      const address = el.tags?.['addr:street'] ? 
        `${el.tags['addr:street']} ${el.tags['addr:housenumber'] || ''}` : 
        `${Math.round(dist)}m`;
      
      const id = el.type + '_' + el.id;
      if (seen.has(id)) continue;
      seen.add(id);
      
      places.push({lat, lng, name, amenity, price, dist, address});
    }
    
    places.sort((a,b) => a.dist - b.dist);
    
    places.forEach((p, i) => {
      const icon = L.divIcon({
        html: `<div class="custom-marker">${p.price} lei</div>`,
        className: '',
        iconSize: [50, 36],
        iconAnchor: [25, 36]
      });
      
      const marker = L.marker([p.lat, p.lng], {icon}).addTo(map);
      
      marker.on('click', () => {
        selectedPlace = p;
        els.placeName.textContent = getIcon(p.amenity) + ' ' + p.name;
        els.placePrice.textContent = `~${p.price} lei · ${getPriceLabel(p.price)}`;
        els.placeAddress.textContent = p.address + ' · ' + Math.round(p.dist) + 'm';
        els.infoCard.classList.add('visible');
      });
      
      placeMarkers.push(marker);
    });
    
    const cheap = places.filter(p => p.price <= 35).length;
    els.status.innerHTML = `✅ ${places.length} locuri (${cheap} ieftine)`;
    
  } catch(e) {
    console.error(e);
    els.status.innerHTML = '❌ Eroare. Încearcă din nou.';
  }
}

function getDistance(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const φ1 = lat1 * Math.PI / 180;
  const φ2 = lat2 * Math.PI / 180;
  const Δφ = (lat2-lat1) * Math.PI / 180;
  const Δλ = (lng2-lng1) * Math.PI / 180;
  const a = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function getPrice(amenity) {
  const prices = {fast_food: 30, cafe: 25, pub: 50, bar: 50, restaurant: 80};
  return prices[amenity] || 50;
}

function defaultName(amenity) {
  const names = {fast_food: 'Fast Food', cafe: 'Cafenea', pub: 'Pub', bar: 'Bar', restaurant: 'Restaurant'};
  return names[amenity] || 'Locație';
}

function getIcon(amenity) {
  const icons = {fast_food: '🍔', cafe: '☕', pub: '🍺', bar: '🍸', restaurant: '🍽️'};
  return icons[amenity] || '📍';
}

function getPriceLabel(price) {
  if (price <= 25) return '🟢 Ieftin';
  if (price <= 50) return '🟡 Mediu';
  return '🔴 Premium';
}

function navigate() {
  if (!selectedPlace) return;
  const url = `https://www.google.com/maps/dir/?api=1&destination=${selectedPlace.lat},${selectedPlace.lng}&travelmode=walking`;
  window.open(url, '_blank');
}

function closeCard() {
  els.infoCard.classList.remove('visible');
}
</script>
