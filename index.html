<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MEma - Găsește Mâncare</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0c12;
    color: #fff;
    overflow: hidden;
    height: 100vh;
    position: fixed;
    width: 100%;
  }

  #map {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 1;
  }

  .control-panel {
    position: absolute;
    top: 10px;
    left: 10px;
    right: 10px;
    z-index: 1000;
    background: rgba(0, 0, 0, 0.9);
    backdrop-filter: blur(20px);
    border-radius: 20px;
    padding: 15px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    max-height: 50vh;
    overflow-y: auto;
  }

  h1 {
    font-size: 1.3rem;
    font-weight: 800;
    background: linear-gradient(135deg, #ff6b6b, #ff9f4a);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-align: center;
    margin-bottom: 15px;
  }

  .control-group {
    margin-bottom: 12px;
  }

  .control-label {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: #aaa;
    margin-bottom: 5px;
  }

  .value-badge {
    color: #ff6b6b;
    font-weight: 700;
  }

  input[type="range"] {
    width: 100%;
    height: 6px;
    -webkit-appearance: none;
    background: #333;
    border-radius: 3px;
    outline: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    background: #ff6b6b;
    border-radius: 50%;
    cursor: pointer;
  }

  .quick-locations {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin: 10px 0;
  }

  .quick-btn {
    padding: 10px;
    background: #1a1f2e;
    border: 1px solid #333;
    border-radius: 15px;
    color: white;
    font-size: 12px;
    cursor: pointer;
  }

  .quick-btn.active {
    background: #ff6b6b;
    border-color: #ff6b6b;
  }

  .btn-primary {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, #ff6b6b, #ff9f4a);
    color: white;
    border: none;
    border-radius: 25px;
    font-weight: 700;
    font-size: 16px;
    cursor: pointer;
    margin-top: 10px;
  }

  .btn-gps {
    width: 100%;
    padding: 12px;
    background: #1a1f2e;
    color: #3b82f6;
    border: 2px solid #3b82f6;
    border-radius: 25px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
  }

  .status-text {
    font-size: 12px;
    color: #aaa;
    text-align: center;
    margin-top: 10px;
    min-height: 20px;
  }

  .info-card {
    position: absolute;
    bottom: 20px;
    left: 20px;
    right: 20px;
    z-index: 1000;
    background: rgba(0, 0, 0, 0.95);
    border-radius: 20px;
    padding: 20px;
    border: 1px solid #333;
    display: none;
  }

  .info-card.visible {
    display: block;
  }

  .place-name {
    font-size: 1.2rem;
    font-weight: 700;
    margin-bottom: 5px;
  }

  .place-price {
    color: #ff6b6b;
    margin-bottom: 10px;
  }

  .btn-nav {
    width: 100%;
    padding: 15px;
    background: #22c55e;
    border: none;
    border-radius: 25px;
    color: white;
    font-weight: 700;
    cursor: pointer;
  }

  .custom-marker {
    width: 30px;
    height: 30px;
    background: #ff6b6b;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    color: white;
    border: 2px solid white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }

  .user-marker {
    width: 20px;
    height: 20px;
    background: #3b82f6;
    border-radius: 50%;
    border: 3px solid white;
    box-shadow: 0 0 0 4px rgba(59,130,246,0.3);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(59,130,246,0.6); }
    70% { box-shadow: 0 0 0 10px rgba(59,130,246,0); }
    100% { box-shadow: 0 0 0 0 rgba(59,130,246,0); }
  }

  .category-filters {
    display: flex;
    gap: 5px;
    overflow-x: auto;
    margin: 10px 0;
    padding-bottom: 5px;
  }

  .cat-btn {
    padding: 8px 12px;
    background: #1a1f2e;
    border: 1px solid #333;
    border-radius: 20px;
    color: #aaa;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
  }

  .cat-btn.active {
    background: #ff6b6b;
    color: white;
    border-color: #ff6b6b;
  }
</style>
</head>
<body>

<div id="map"></div>

<div class="control-panel">
  <h1>🍽️ MEma</h1>
  
  <div class="control-group">
    <div class="control-label">
      <span>📍 Raza: <span id="radiusValue" class="value-badge">1000 m</span></span>
    </div>
    <input type="range" id="radiusSlider" min="10" max="5000" step="10" value="1000">
  </div>

  <div class="control-group">
    <div class="control-label">
      <span>💰 Buget max: <span id="budgetValue" class="value-badge">50 lei</span></span>
    </div>
    <input type="range" id="budgetSlider" min="10" max="1000" step="10" value="50">
  </div>

  <div class="category-filters">
    <button class="cat-btn active" data-cat="all">Toate</button>
    <button class="cat-btn" data-cat="fast_food">🍔 Fast-Food</button>
    <button class="cat-btn" data-cat="restaurant">🍽️ Restaurant</button>
    <button class="cat-btn" data-cat="cafe">☕ Cafea</button>
  </div>

  <div class="quick-locations">
    <button class="quick-btn active" onclick="setLocation(44.4325, 26.1038, 'Centrul Vechi')">Centrul Vechi</button>
    <button class="quick-btn" onclick="setLocation(44.4396, 26.0963, 'Victoriei')">Victoriei</button>
    <button class="quick-btn" onclick="setLocation(44.4654, 26.0666, 'Herăstrău')">Herăstrău</button>
    <button class="quick-btn" onclick="setLocation(44.4282, 26.1225, 'Titan')">Titan</button>
  </div>

  <button class="btn-gps" onclick="getGPS()">📍 Folosește GPS-ul meu</button>
  <button class="btn-primary" onclick="searchPlaces()">🔍 CAUTĂ LOCURI</button>
  
  <div class="status-text" id="status">Alege o zonă sau folosește GPS</div>
</div>

<div id="infoCard" class="info-card">
  <div id="placeName" class="place-name"></div>
  <div id="placePrice" class="place-price"></div>
  <div id="placeAddress" style="color:#aaa; margin-bottom:15px;"></div>
  <button class="btn-nav" onclick="navigate()">🧭 Navigare Google Maps</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
let map;
let userMarker;
let radiusCircle;
let placeMarkers = [];
let currentLat = 44.4325;
let currentLng = 26.1038;
let currentCategory = 'all';
let selectedPlace = null;

// Inițializare
window.onload = function() {
  map = L.map('map').setView([currentLat, currentLng], 15);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
  }).addTo(map);
  
  updateUserMarker(currentLat, currentLng);
  updateCircle(1000);
  
  // Event listeners
  document.getElementById('radiusSlider').addEventListener('input', function() {
    document.getElementById('radiusValue').textContent = this.value + ' m';
    updateCircle(parseInt(this.value));
  });
  
  document.getElementById('budgetSlider').addEventListener('input', function() {
    document.getElementById('budgetValue').textContent = this.value + ' lei';
  });
  
  document.querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      currentCategory = this.dataset.cat;
    });
  });
  
  map.on('click', () => {
    document.getElementById('infoCard').classList.remove('visible');
  });
};

function updateUserMarker(lat, lng) {
  if (userMarker) map.removeLayer(userMarker);
  
  const icon = L.divIcon({
    html: '<div class="user-marker"></div>',
    className: '',
    iconSize: [20, 20],
    iconAnchor: [10, 10]
  });
  
  userMarker = L.marker([lat, lng], {icon: icon, zIndexOffset: 1000}).addTo(map);
}

function updateCircle(radius) {
  if (radiusCircle) map.removeLayer(radiusCircle);
  
  radiusCircle = L.circle([currentLat, currentLng], {
    radius: radius,
    color: '#ff6b6b',
    weight: 2,
    fillColor: '#ff6b6b',
    fillOpacity: 0.1,
    dashArray: '5,5'
  }).addTo(map);
  
  map.fitBounds(radiusCircle.getBounds(), {padding: [50,50]});
}

function setLocation(lat, lng, name) {
  currentLat = lat;
  currentLng = lng;
  
  map.setView([lat, lng], 15);
  updateUserMarker(lat, lng);
  updateCircle(parseInt(document.getElementById('radiusSlider').value));
  
  document.querySelectorAll('.quick-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  
  document.getElementById('status').textContent = '📍 ' + name;
}

function getGPS() {
  if (!navigator.geolocation) {
    document.getElementById('status').textContent = '❌ GPS indisponibil. Folosește butoanele de zonă.';
    return;
  }
  
  document.getElementById('status').textContent = '⏳ Se obține poziția...';
  
  navigator.geolocation.getCurrentPosition(
    function(pos) {
      currentLat = pos.coords.latitude;
      currentLng = pos.coords.longitude;
      
      map.setView([currentLat, currentLng], 15);
      updateUserMarker(currentLat, currentLng);
      updateCircle(parseInt(document.getElementById('radiusSlider').value));
      
      document.getElementById('status').textContent = '✅ Poziție GPS obținută!';
      
      // Caută automat
      setTimeout(searchPlaces, 500);
    },
    function(err) {
      document.getElementById('status').textContent = '❌ Nu am putut obține GPS. Folosește butoanele de zonă.';
    },
    {enableHighAccuracy: true, timeout: 10000}
  );
}

async function searchPlaces() {
  const radius = parseInt(document.getElementById('radiusSlider').value);
  const budget = parseInt(document.getElementById('budgetSlider').value);
  
  document.getElementById('status').textContent = '⏳ Caut locuri...';
  
  // Șterge markere vechi
  placeMarkers.forEach(m => map.removeLayer(m));
  placeMarkers = [];
  
  try {
    const radiusDeg = radius / 111000;
    let amenityFilter = currentCategory === 'all' 
      ? '["amenity"~"restaurant|fast_food|cafe|pub|bar"]'
      : `["amenity"="${currentCategory}"]`;
    
    const query = `[out:json][timeout:25];
(
  node${amenityFilter}(${currentLat - radiusDeg},${currentLng - radiusDeg},${currentLat + radiusDeg},${currentLng + radiusDeg});
  way${amenityFilter}(${currentLat - radiusDeg},${currentLng - radiusDeg},${currentLat + radiusDeg},${currentLng + radiusDeg});
);
out body center;`;
    
    const response = await fetch('https://overpass-api.de/api/interpreter', {
      method: 'POST',
      body: query,
      headers: {'Content-Type': 'application/x-www-form-urlencoded'}
    });
    
    const data = await response.json();
    const places = [];
    const seen = new Set();
    
    for (const el of data.elements) {
      let lat, lng;
      if (el.type === 'node') {
        lat = el.lat; lng = el.lon;
      } else if (el.center) {
        lat = el.center.lat; lng = el.center.lon;
      } else continue;
      
      const dist = getDistance(currentLat, currentLng, lat, lng);
      if (dist > radius) continue;
      
      const amenity = el.tags?.amenity || 'restaurant';
      const price = getPrice(amenity);
      if (price > budget) continue;
      
      const name = el.tags?.name || (amenity === 'fast_food' ? 'Fast Food' : 
                   amenity === 'cafe' ? 'Cafenea' : 'Restaurant');
      
      const id = el.type + '_' + el.id;
      if (seen.has(id)) continue;
      seen.add(id);
      
      places.push({lat, lng, name, amenity, price, dist, 
        address: el.tags?.['addr:street'] || `${Math.round(dist)}m de tine`});
    }
    
    places.sort((a,b) => a.dist - b.dist);
    
    // Afișează pe hartă
    places.forEach((p, i) => {
      const icon = L.divIcon({
        html: `<div class="custom-marker">${i+1}</div>`,
        className: '',
        iconSize: [30,30],
        iconAnchor: [15,30]
      });
      
      const marker = L.marker([p.lat, p.lng], {icon}).addTo(map);
      
      marker.on('click', () => {
        selectedPlace = p;
        document.getElementById('placeName').textContent = getIcon(p.amenity) + ' ' + p.name;
        document.getElementById('placePrice').textContent = `~${p.price} lei · ${getPriceLabel(p.price)}`;
        document.getElementById('placeAddress').textContent = p.address;
        document.getElementById('infoCard').classList.add('visible');
      });
      
      placeMarkers.push(marker);
    });
    
    const cheap = places.filter(p => p.price <= 35).length;
    document.getElementById('status').textContent = 
      `✅ ${places.length} locuri găsite (${cheap} sub 35 lei)`;
    
  } catch(e) {
    document.getElementById('status').textContent = '❌ Eroare. Încearcă din nou.';
    console.error(e);
  }
}

function getDistance(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const φ1 = lat1 * Math.PI / 180;
  const φ2 = lat2 * Math.PI / 180;
  const Δφ = (lat2-lat1) * Math.PI / 180;
  const Δλ = (lng2-lng1) * Math.PI / 180;
  const a = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function getPrice(amenity) {
  const prices = {
    'fast_food': 30, 'cafe': 25, 'pub': 50, 'bar': 50,
    'ice_cream': 20, 'pastry': 15, 'bakery': 12, 'restaurant': 80
  };
  return prices[amenity] || 50;
}

function getPriceLabel(price) {
  if (price <= 25) return '🟢 Ieftin';
  if (price <= 50) return '🟡 Mediu';
  return '🔴 Premium';
}

function getIcon(amenity) {
  const icons = {'fast_food':'🍔','cafe':'☕','pub':'🍺','bar':'🍸','restaurant':'🍽️'};
  return icons[amenity] || '📍';
}

function navigate() {
  if (!selectedPlace) return;
  const url = `https://www.google.com/maps/dir/?api=1&destination=${selectedPlace.lat},${selectedPlace.lng}&travelmode=walking`;
  window.open(url, '_blank');
}
</script>
</body>
</html>
