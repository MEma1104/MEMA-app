<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>MEMA - Mănânci Economic, Mănânci Aproape</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(135deg, #0a0c12 0%, #1a1f2e 100%);
    color: #fff;
    overflow: hidden;
    height: 100vh;
    position: fixed;
    width: 100%;
  }

  #map {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 1;
    opacity: 0.25;
  }

  .main-container {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 20px;
    pointer-events: none;
  }

  .center-card {
    background: rgba(0, 0, 0, 0.92);
    backdrop-filter: blur(25px);
    border-radius: 35px;
    padding: 35px 30px;
    border: 2px solid rgba(255, 107, 107, 0.2);
    width: 100%;
    max-width: 400px;
    pointer-events: auto;
    box-shadow: 0 30px 100px rgba(0,0,0,0.7), 0 0 60px rgba(255,107,107,0.1);
  }

  .header {
    text-align: center;
    margin-bottom: 30px;
  }

  .logo {
    font-family: 'Montserrat', sans-serif;
    font-size: 4.5rem;
    font-weight: 900;
    letter-spacing: 4px;
    margin-bottom: 12px;
    background: linear-gradient(135deg, #ff6b6b 0%, #ff9f4a 25%, #ff6b6b 50%, #ff9f4a 75%, #ff6b6b 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 60px rgba(255,107,107,0.4);
    animation: shine 3s ease-in-out infinite;
    -webkit-text-stroke: 1px rgba(255,255,255,0.1);
  }

  @keyframes shine {
    0%, 100% { filter: brightness(1) drop-shadow(0 0 20px rgba(255,107,107,0.3)); }
    50% { filter: brightness(1.3) drop-shadow(0 0 40px rgba(255,159,74,0.5)); }
  }

  .tagline {
    font-size: 0.85rem;
    font-weight: 400;
    letter-spacing: 1px;
    color: #aaa;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .tagline .brand-m {
    color: #ff6b6b;
    font-weight: 700;
    text-shadow: 0 0 8px rgba(255,107,107,0.5);
  }

  .tagline .brand-e {
    color: #ff8a5c;
    font-weight: 700;
    text-shadow: 0 0 8px rgba(255,138,92,0.5);
  }

  .tagline .brand-m2 {
    color: #ff9f4a;
    font-weight: 700;
    text-shadow: 0 0 8px rgba(255,159,74,0.5);
  }

  .tagline .brand-a {
    color: #ff6b6b;
    font-weight: 700;
    text-shadow: 0 0 8px rgba(255,107,107,0.5);
  }

  .gps-button {
    width: 100%;
    padding: 20px;
    background: linear-gradient(135deg, #ff6b6b 0%, #ff9f4a 100%);
    color: white;
    border: none;
    border-radius: 30px;
    font-weight: 800;
    font-size: 1.2rem;
    cursor: pointer;
    margin-bottom: 25px;
    box-shadow: 0 15px 40px rgba(255,107,107,0.4);
    transition: all 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .gps-button:active {
    transform: scale(0.96);
    box-shadow: 0 8px 20px rgba(255,107,107,0.3);
  }

  .gps-icon {
    width: 24px;
    height: 24px;
    border: 3px solid white;
    border-radius: 50%;
    position: relative;
    animation: pulse 2s infinite;
  }

  .gps-icon::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 8px;
    height: 8px;
    background: white;
    border-radius: 50%;
    transform: translate(-50%, -50%);
  }

  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(255,255,255,0.7); }
    70% { box-shadow: 0 0 0 15px rgba(255,255,255,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); }
  }

  .filters {
    display: flex;
    flex-direction: column;
    gap: 20px;
    margin-bottom: 25px;
  }

  .filter-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .filter-label {
    font-size: 0.95rem;
    color: #aaa;
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 400;
  }

  .filter-value {
    color: #ff9f4a;
    font-weight: 700;
    font-size: 1.1rem;
  }

  input[type="range"] {
    width: 100%;
    height: 8px;
    -webkit-appearance: none;
    background: linear-gradient(90deg, #333 0%, #444 100%);
    border-radius: 4px;
    outline: none;
    margin-top: 10px;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 26px;
    height: 26px;
    background: linear-gradient(135deg, #ff6b6b, #ff9f4a);
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(255,107,107,0.5);
    border: 2px solid white;
  }

  .search-btn {
    width: 100%;
    padding: 22px;
    background: white;
    color: #0a0c12;
    border: none;
    border-radius: 30px;
    font-weight: 900;
    font-size: 1.2rem;
    cursor: pointer;
    margin-bottom: 20px;
    transition: all 0.3s;
    text-transform: uppercase;
    letter-spacing: 2px;
    box-shadow: 0 10px 30px rgba(255,255,255,0.2);
  }

  .search-btn:active {
    transform: scale(0.96);
    box-shadow: 0 5px 15px rgba(255,255,255,0.1);
  }

  .status {
    text-align: center;
    font-size: 0.9rem;
    color: #888;
    min-height: 24px;
    font-weight: 400;
  }

  .info-card {
    position: absolute;
    bottom: 20px;
    left: 20px;
    right: 20px;
    z-index: 100;
    background: rgba(0, 0, 0, 0.95);
    backdrop-filter: blur(25px);
    border-radius: 30px;
    padding: 25px;
    border: 2px solid rgba(255,107,107,0.2);
    display: none;
    pointer-events: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.8);
  }

  .info-card.visible {
    display: block;
    animation: slideUp 0.4s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .place-name {
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 8px;
    color: white;
  }

  .place-price {
    color: #ff9f4a;
    font-weight: 700;
    font-size: 1.1rem;
    margin-bottom: 12px;
  }

  .place-address {
    color: #aaa;
    font-size: 0.95rem;
    margin-bottom: 20px;
    line-height: 1.4;
  }

  .nav-btn {
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: white;
    border: none;
    border-radius: 25px;
    font-weight: 800;
    font-size: 1.1rem;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .close-btn {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 36px;
    height: 36px;
    background: rgba(255,255,255,0.1);
    border: none;
    border-radius: 50%;
    color: white;
    font-size: 1.4rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .close-btn:active {
    background: rgba(255,107,107,0.3);
  }

  .custom-marker {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, #ff6b6b, #ff9f4a);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-size: 1.1rem;
    color: white;
    border: 3px solid white;
    box-shadow: 0 4px 15px rgba(0,0,0,0.4);
  }

  .user-marker {
    width: 28px;
    height: 28px;
    background: #3b82f6;
    border-radius: 50%;
    border: 4px solid white;
    box-shadow: 0 0 0 5px rgba(59,130,246,0.3);
    animation: pulseBlue 2s infinite;
  }

  @keyframes pulseBlue {
    0% { box-shadow: 0 0 0 0 rgba(59,130,246,0.6); }
    70% { box-shadow: 0 0 0 15px rgba(59,130,246,0); }
    100% { box-shadow: 0 0 0 0 rgba(59,130,246,0); }
  }

  .loader {
    display: inline-block;
    width: 18px;
    height: 18px;
    border: 3px solid #fff;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-right: 10px;
    vertical-align: middle;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>

<div id="map"></div>

<div class="main-container">
  <div class="center-card">
    <div class="header">
      <div class="logo">MEMA</div>
      <div class="tagline">
        <span class="brand-m">M</span>ănânci <span class="brand-e">E</span>conomic, <span class="brand-m2">M</span>ănânci <span class="brand-a">A</span>proape
      </div>
    </div>

    <button class="gps-button" onclick="getLocation()">
      <div class="gps-icon"></div>
      LOCALIZEAZĂ-MĂ
    </button>

    <div class="filters">
      <div>
        <div class="filter-row">
          <span class="filter-label">📍 Raza de căutare</span>
          <span class="filter-value" id="radiusValue">1000 m</span>
        </div>
        <input type="range" id="radiusSlider" min="10" max="5000" step="10" value="1000">
      </div>

      <div>
        <div class="filter-row">
          <span class="filter-label">💰 Buget maxim</span>
          <span class="filter-value" id="budgetValue">50 lei</span>
        </div>
        <input type="range" id="budgetSlider" min="10" max="1000" step="10" value="50">
      </div>
    </div>

    <button class="search-btn" onclick="searchPlaces()">🔍 CAUTĂ LOCURI</button>
    
    <div class="status" id="status">Apasă LOCALIZEAZĂ-MĂ pentru a începe</div>
  </div>
</div>

<div id="infoCard" class="info-card">
  <button class="close-btn" onclick="closeCard()">×</button>
  <div id="placeName" class="place-name"></div>
  <div id="placePrice" class="place-price"></div>
  <div id="placeAddress" class="place-address"></div>
  <button class="nav-btn" onclick="navigate()">🧭 Navigare Google Maps</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
let map;
let userMarker;
let radiusCircle;
let placeMarkers = [];
let currentLat = null;
let currentLng = null;
let selectedPlace = null;

const els = {
  radiusSlider: document.getElementById('radiusSlider'),
  radiusValue: document.getElementById('radiusValue'),
  budgetSlider: document.getElementById('budgetSlider'),
  budgetValue: document.getElementById('budgetValue'),
  status: document.getElementById('status'),
  infoCard: document.getElementById('infoCard'),
  placeName: document.getElementById('placeName'),
  placePrice: document.getElementById('placePrice'),
  placeAddress: document.getElementById('placeAddress')
};

window.onload = function() {
  map = L.map('map', {zoomControl: false}).setView([44.4325, 26.1038], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: ''
  }).addTo(map);
  
  L.control.zoom({position: 'bottomright'}).addTo(map);
  
  els.radiusSlider.addEventListener('input', function() {
    els.radiusValue.textContent = this.value + ' m';
    if (currentLat) updateCircle(parseInt(this.value));
  });
  
  els.budgetSlider.addEventListener('input', function() {
    els.budgetValue.textContent = this.value + ' lei';
  });
};

function getLocation() {
  if (!navigator.geolocation) {
    els.status.innerHTML = '❌ GPS indisponibil pe acest dispozitiv';
    return;
  }
  
  els.status.innerHTML = '<span class="loader"></span> Se obține locația...';
  
  navigator.geolocation.getCurrentPosition(
    function(pos) {
      currentLat = pos.coords.latitude;
      currentLng = pos.coords.longitude;
      
      map.setView([currentLat, currentLng], 16);
      
      if (userMarker) map.removeLayer(userMarker);
      const icon = L.divIcon({
        html: '<div class="user-marker"></div>',
        className: '',
        iconSize: [28, 28],
        iconAnchor: [14, 14]
      });
      userMarker = L.marker([currentLat, currentLng], {icon: icon, zIndexOffset: 1000}).addTo(map);
      
      updateCircle(parseInt(els.radiusSlider.value));
      els.status.innerHTML = '✅ Locație obținută! Apasă CAUTĂ LOCURI';
    },
    function(err) {
      console.error(err);
      els.status.innerHTML = '❌ Nu am putut obține GPS. Verifică permisiunile în Setări > Safari > Locație';
    },
    {enableHighAccuracy: true, timeout: 10000, maximumAge: 0}
  );
}

function updateCircle(radius) {
  if (radiusCircle) map.removeLayer(radiusCircle);
  
  radiusCircle = L.circle([currentLat, currentLng], {
    radius: radius,
    color: '#ff6b6b',
    weight: 2,
    fillColor: '#ff6b6b',
    fillOpacity: 0.1,
    dashArray: '5,5'
  }).addTo(map);
  
  map.fitBounds(radiusCircle.getBounds(), {padding: [50,50]});
}

async function searchPlaces() {
  if (!currentLat) {
    els.status.innerHTML = '⚠️ Apasă mai întâi LOCALIZEAZĂ-MĂ';
    return;
  }
  
  const radius = parseInt(els.radiusSlider.value);
  const budget = parseInt(els.budgetSlider.value);
  
  els.status.innerHTML = '<span class="loader"></span> Se caută locuri...';
  
  placeMarkers.forEach(m => map.removeLayer(m));
  placeMarkers = [];
  
  try {
    const radiusDeg = radius / 111000;
    const query = `[out:json][timeout:25];
(
  node["amenity"~"restaurant|fast_food|cafe|pub|bar"](${currentLat - radiusDeg},${currentLng - radiusDeg},${currentLat + radiusDeg},${currentLng + radiusDeg});
  way["amenity"~"restaurant|fast_food|cafe|pub|bar"](${currentLat - radiusDeg},${currentLng - radiusDeg},${currentLat + radiusDeg},${currentLng + radiusDeg});
);
out body center;`;
    
    const response = await fetch('https://overpass-api.de/api/interpreter', {
      method: 'POST',
      body: query,
      headers: {'Content-Type': 'application/x-www-form-urlencoded'}
    });
    
    const data = await response.json();
    const places = [];
    const seen = new Set();
    
    for (const el of data.elements) {
      let lat, lng;
      if (el.type === 'node') {
        lat = el.lat; lng = el.lon;
      } else if (el.center) {
        lat = el.center.lat; lng = el.center.lon;
      } else continue;
      
      const dist = getDistance(currentLat, currentLng, lat, lng);
      if (dist > radius) continue;
      
      const amenity = el.tags?.amenity || 'restaurant';
      const price = getPrice(amenity);
      if (price > budget) continue;
      
      const name = el.tags?.name || defaultName(amenity);
      const address = el.tags?.['addr:street'] ? 
        `${el.tags['addr:street']} ${el.tags['addr:housenumber'] || ''}` : 
        `${Math.round(dist)}m de tine`;
      
      const id = el.type + '_' + el.id;
      if (seen.has(id)) continue;
      seen.add(id);
      
      places.push({lat, lng, name, amenity, price, dist, address});
    }
    
    places.sort((a,b) => a.dist - b.dist);
    
    places.forEach((p, i) => {
      const icon = L.divIcon({
        html: `<div class="custom-marker">${i+1}</div>`,
        className: '',
        iconSize: [40, 40],
        iconAnchor: [20, 40]
      });
      
      const marker = L.marker([p.lat, p.lng], {icon}).addTo(map);
      
      marker.on('click', () => {
        selectedPlace = p;
        els.placeName.textContent = getIcon(p.amenity) + ' ' + p.name;
        els.placePrice.textContent = `~${p.price} lei · ${getPriceLabel(p.price)}`;
        els.placeAddress.textContent = p.address + ' · ' + Math.round(p.dist) + 'm';
        els.infoCard.classList.add('visible');
      });
      
      placeMarkers.push(marker);
    });
    
    const cheap = places.filter(p => p.price <= 35).length;
    els.status.innerHTML = `✅ ${places.length} locuri găsite (${cheap} sub 35 lei)`;
    
  } catch(e) {
    console.error(e);
    els.status.innerHTML = '❌ Eroare de rețea. Încearcă din nou.';
  }
}

function getDistance(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const φ1 = lat1 * Math.PI / 180;
  const φ2 = lat2 * Math.PI / 180;
  const Δφ = (lat2-lat1) * Math.PI / 180;
  const Δλ = (lng2-lng1) * Math.PI / 180;
  const a = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function getPrice(amenity) {
  const prices = {fast_food: 30, cafe: 25, pub: 50, bar: 50, restaurant: 80};
  return prices[amenity] || 50;
}

function defaultName(amenity) {
  const names = {fast_food: 'Fast Food', cafe: 'Cafenea', pub: 'Pub', bar: 'Bar', restaurant: 'Restaurant'};
  return names[amenity] || 'Locație';
}

function getIcon(amenity) {
  const icons = {fast_food: '🍔', cafe: '☕', pub: '🍺', bar: '🍸', restaurant: '🍽️'};
  return icons[amenity] || '📍';
}

function getPriceLabel(price) {
  if (price <= 25) return '🟢 Super ieftin';
  if (price <= 50) return '🟡 Preț mediu';
  return '🔴 Premium';
}

function navigate() {
  if (!selectedPlace) return;
  const url = `https://www.google.com/maps/dir/?api=1&destination=${selectedPlace.lat},${selectedPlace.lng}&travelmode=walking`;
  window.open(url, '_blank');
}

function closeCard() {
  els.infoCard.classList.remove('visible');
}
</script>
</body>
</html>
